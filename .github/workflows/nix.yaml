name: Nix Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: DeterminateSystems/determinate-nix-action@v3.19.0
    - uses: DeterminateSystems/magic-nix-cache-action@v13
      with:
        use-flakehub: false

    - name: Build Nix Package
      run: nix build .
